spring:
  application:
    name: my-spring-boot-app2-security

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/security_lab}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  security:
    user:
      name: ignored-when-db-auth-is-enabled
      password: ignored-when-db-auth-is-enabled

app:
  jwt:
    secret: ${APP_JWT_SECRET:c3ByaW5nLXNlY3VyaXR5LWxvY2FsLWRldi1zZWNyZXQtMzItYnl0ZXMhIQ==}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:36000000}
